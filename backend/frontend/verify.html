<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>JSON Panic – Підтвердження email</title>
  <link rel="stylesheet" href="styles.css">

  <style>
    .verify-screen {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 30px;
    }

    .verify-card {
      max-width: 520px;
      width: 100%;
      text-align: center;
      border: 1px solid #22d3ee;
      box-shadow: 0 0 30px rgba(34, 211, 238, 0.25);
    }

    .verify-card h1 {
      color: #22d3ee;
      text-shadow: 0 0 12px #22d3ee;
    }

    .message {
      margin-top: 18px;
      line-height: 1.6;
    }

    .success {
      color: #4ade80;
    }

    .error {
      color: #f87171;
    }

    .loading {
      color: #facc15;
    }

    a {
      color: #22d3ee;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <main class="verify-screen">
    <section class="card verify-card">
      <h1>📧 Email Verification</h1>
      <p id="message" class="message loading">Перевіряємо токен підтвердження...</p>
      <p><a href="login.html">Перейти до входу</a></p>
    </section>
  </main>

<script>
async function verifyEmail() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");
  const message = document.getElementById("message");

  if (!token) {
    message.className = "message error";
    message.innerText = "Токен підтвердження відсутній.";
    return;
  }

  try {
    const response = await fetch("http://localhost:5000/api/auth/verify-email/" + token);
    const data = await response.json();

    if (!response.ok) {
      message.className = "message error";
      message.innerText = data.message || "Не вдалося підтвердити email.";
      return;
    }

    message.className = "message success";
    message.innerText = "Email успішно підтверджено. Тепер можна увійти в систему.";

  } catch (error) {
    message.className = "message error";
    message.innerText = "Помилка з'єднання з сервером.";
  }
}

verifyEmail();
</script>

<script src="sound.js"></script>
<script>
  playMusic("menu.mp3");
</script>

</body>
</html>
