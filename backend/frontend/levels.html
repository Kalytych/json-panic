<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>JSON Panic – Рівні</title>

  <style>
    body {
      margin: 0;
      background: #111827;
      color: #f9fafb;
      font-family: Arial, sans-serif;
    }

    header {
      background: #020617;
      padding: 20px 40px;
      border-bottom: 2px solid #22d3ee;
    }

    header h1 {
      margin: 0;
      color: #22d3ee;
    }

    main {
      padding: 30px 40px;
    }

    nav a {
      color: #22d3ee;
      font-weight: bold;
      margin-right: 15px;
      text-decoration: none;
    }

    .levels {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 25px;
    }

    .card {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 20px;
    }

    .card h2 {
      margin-top: 0;
      color: #5eead4;
    }

    .badge {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 20px;
      background: #020617;
      color: #22d3ee;
      margin-right: 6px;
      font-size: 14px;
    }

    button {
      margin-top: 15px;
      padding: 12px 18px;
      background: #22d3ee;
      color: #020617;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .error {
      color: #f87171;
    }
  </style>
</head>

<script src="sound.js"></script>

<body>
  <header>
    <h1>🎮 Вибір рівня</h1>
    <p>Обери пошкоджений JSON-файл для відновлення сервера</p>

    <nav>
      <a href="levels.html">🎮 Рівні</a>
      <a href="profile.html">👤 Профіль</a>
      <a href="leaderboard.html">🏆 Лідерборд</a>
      <a href="#" onclick="logout()" style="color:#f87171;">🚪 Вийти</a>
    </nav>
  </header>

  <main>
    <div id="status"></div>
    <section id="levelsContainer" class="levels"></section>
  </main>

<script>
const USER_TOKEN = localStorage.getItem("token");

if (!USER_TOKEN) {
  window.location.href = "login.html";
}

async function loadLevels() {
  try {
    const response = await fetch("/api/game/start");
    const levels = await response.json();

    const container = document.getElementById("levelsContainer");
    container.innerHTML = "";

    levels.forEach(level => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <h2>${level.title}</h2>
        <p>${level.description}</p>
        <p>
          <span class="badge">Складність: ${level.difficulty}</span>
          <span class="badge">Режим: ${level.mode}</span>
        </p>
        <p><strong>Макс. бали:</strong> ${level.max_score}</p>
        <p><strong>Ліміт часу:</strong> ${level.time_limit > 0 ? level.time_limit + " сек." : "без ліміту"}</p>
        <button onclick="startLevel(${level.id})">Почати рівень</button>
      `;

      container.appendChild(card);
    });

  } catch (error) {
    document.getElementById("status").innerHTML =
      "<p class='error'>Помилка завантаження рівнів</p>";
  }
}

function startLevel(levelId) {
  localStorage.setItem("selectedLevelId", levelId);
  window.location.href = "index.html";
}

function logout() {
  localStorage.removeItem("token");
  localStorage.removeItem("user");
  localStorage.removeItem("selectedLevelId");
  window.location.href = "login.html";
}

loadLevels();
</script>

</body>
</html>
