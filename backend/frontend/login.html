<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>JSON Panic – Вхід</title>
  <link rel="stylesheet" href="styles.css">

  <style>
    .auth-screen {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 30px;
      position: relative;
      overflow: hidden;
    }

    .auth-card {
      width: 100%;
      max-width: 440px;
      background:
        linear-gradient(135deg, rgba(34, 211, 238, 0.12), transparent),
        rgba(15, 23, 42, 0.94);
      border: 1px solid rgba(34, 211, 238, 0.55);
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 0 35px rgba(34, 211, 238, 0.25);
      position: relative;
      overflow: hidden;
    }

    .auth-card::before {
      content: "SECURE ACCESS";
      position: absolute;
      top: 14px;
      right: 16px;
      color: rgba(34, 211, 238, 0.25);
      font-size: 12px;
      letter-spacing: 2px;
    }

    .auth-card h1 {
      text-align: center;
      color: #22d3ee;
      text-shadow: 0 0 12px #22d3ee;
      margin-bottom: 8px;
    }

    .auth-subtitle {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 24px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #020617;
      color: #e2e8f0;
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: #22d3ee;
      box-shadow: 0 0 12px rgba(34, 211, 238, 0.45);
    }

    .auth-button {
      width: 100%;
      margin-top: 18px;
      padding: 14px;
      font-size: 15px;
    }

    .auth-links {
      margin-top: 18px;
      text-align: center;
      color: #94a3b8;
    }

    .auth-links a {
      color: #22d3ee;
      font-weight: bold;
      text-decoration: none;
    }

    .auth-links a:hover {
      text-shadow: 0 0 8px #22d3ee;
    }

    .message {
      margin-top: 16px;
      text-align: center;
    }

    .error {
      color: #f87171;
    }

    .success {
      color: #4ade80;
    }
  </style>
</head>

<script src="sound.js"></script>

<body>
  <main class="auth-screen">
    <section class="auth-card">
      <h1>🔐 LOGIN NODE</h1>
      <p class="auth-subtitle">Авторизація оператора JSON Panic</p>

      <input type="email" id="email" placeholder="Email оператора">
      <input type="password" id="password" placeholder="Пароль доступу">

      <button class="auth-button" onclick="login()">Увійти в систему</button>

      <div class="auth-links">
        <p>Немає акаунта? <a href="register.html">Зареєструватися</a></p>
        <p><a href="home.html">← На головну</a></p>
      </div>

      <p id="message" class="message"></p>
    </section>
  </main>

<script>
async function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const message = document.getElementById("message");

  if (!email || !password) {
    message.innerHTML = "<span class='error'>Заповніть всі поля</span>";
    return;
  }

  try {
    const response = await fetch("/api/auth/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    const data = await response.json();

    if (!response.ok) {
      message.innerHTML = "<span class='error'>" + data.message + "</span>";
      return;
    }

    localStorage.removeItem("guestMode");
    localStorage.setItem("token", data.token);
    localStorage.setItem("user", JSON.stringify(data.user));

    message.innerHTML = "<span class='success'>ACCESS GRANTED · Вхід успішний</span>";

    setTimeout(() => {
      window.location.href = "servers.html";
    }, 700);

  } catch (error) {
    message.innerHTML = "<span class='error'>Помилка з'єднання з сервером</span>";
  }
}
</script>

</body>
</html>
